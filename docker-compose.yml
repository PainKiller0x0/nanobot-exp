services:
  nanobot:
    build: .
    container_name: nanobot-cage
    user: root
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /root/.nanobot:/root/.nanobot
      - /root/nanobot:/app
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    mem_limit: 900m
    memswap_limit: 1400m
    cpus: 1.2
    environment:
      - NANOBOT_CONFIG=/root/.nanobot/config.json
      - TZ=Asia/Shanghai
      - NANOBOT_REFLEXIO_ENABLED=true
      - REFLEXIO_URL=http://172.17.0.1:8081
      - NANOBOT_FAILOVER_SETTINGS_URL=http://150.158.121.88:8000/admin/failover
    networks:
      - bot-net

  wechat-rss-sidecar:
    image: python:3.11-slim
    container_name: wechat-rss-sidecar
    user: root
    working_dir: /root/.nanobot/workspace/wechat_rss_service
    command: sh -lc "WECHAT_RSS_HOST=0.0.0.0 WECHAT_RSS_PORT=8091 python3 app.py"
    ports:
      - "8091:8091"
    volumes:
      - /root/.nanobot:/root/.nanobot
      - /root/nanobot:/root/nanobot:ro
    restart: always
    mem_limit: 180m
    memswap_limit: 300m
    cpus: 0.3
    networks:
      - bot-net

networks:
  bot-net:
    driver: bridge
