<!DOCTYPE html>
<html lang="zh-CN" x-data="app()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OBP 控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors" x-cloak>
  <div class="max-w-7xl mx-auto px-4 py-6 md:px-6 md:py-8" x-init="init()">
    <header class="mb-6">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 class="text-2xl md:text-3xl font-black tracking-tight text-indigo-600 dark:text-indigo-400">OBP 控制台</h1>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">统一管理 OpenAI / Gemini 转发与 529 备用模型切换</p>
        </div>
        <div class="flex items-center gap-2">
          <button @click="refreshNow()" class="px-3 py-2 text-sm rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700">??</button>
          <button @click="toggleAutoRefresh()" class="px-3 py-2 text-sm rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700" x-text="autoRefresh ? '自动刷新：开' : '自动刷新：关'"></button>
          <button @click="toggleDarkMode()" class="px-3 py-2 text-sm rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700" x-text="darkMode ? '浅色模式' : '深色模式'"></button>
          <button @click="openAdd()" class="px-4 py-2 text-sm font-semibold rounded-xl bg-indigo-600 text-white hover:bg-indigo-700">新增渠道</button>
        </div>
      </div>
      <div class="mt-3 flex flex-wrap items-center gap-2 text-xs">
        <span class="text-slate-500 dark:text-slate-400">API 入口</span>
        <button @click="copy(window.location.origin + '/v1')" class="px-3 py-1 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 font-mono" x-text="copied ? '已复制' : (window.location.origin + '/v1')"></button>
        <span class="text-slate-400 ml-2" x-text="'上次刷新：' + lastRefresh"></span>
      </div>
    </header>

    <main class="grid grid-cols-1 xl:grid-cols-12 gap-4">
      <section class="xl:col-span-8 space-y-4">
        <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3">
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-3">
            <div class="text-xs text-slate-500">渠道总数</div>
            <div class="text-2xl font-bold mt-1" x-text="channels.length"></div>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-3">
            <div class="text-xs text-slate-500">可用渠道</div>
            <div class="text-2xl font-bold mt-1 text-emerald-600" x-text="activeCount"></div>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-3">
            <div class="text-xs text-slate-500">今日请求</div>
            <div class="text-2xl font-bold mt-1 text-sky-600 dark:text-sky-300" x-text="todayRequests"></div>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-3">
            <div class="text-xs text-slate-500">近 7 天</div>
            <div class="text-2xl font-bold mt-1" x-text="sevenDayRequests"></div>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-3">
            <div class="text-xs text-slate-500">成功率</div>
            <div class="text-2xl font-bold mt-1 text-emerald-600" x-text="successRate"></div>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-3">
            <div class="text-xs text-slate-500">总 Token</div>
            <div class="text-2xl font-bold mt-1" x-text="formatNumber(totalTokens)"></div>
          </div>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden">
          <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex flex-wrap items-center justify-between gap-2">
            <h2 class="font-semibold">渠道管理</h2>
            <div class="flex items-center gap-2">
              <input x-model.trim="search" placeholder="搜索名称 / 模型" class="px-3 py-1.5 text-sm rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 w-52">
              <select x-model="statusFilter" class="px-2 py-1.5 text-sm rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
                <option value="all">全部状态</option>
                <option value="active">仅可用</option>
                <option value="error">仅异常</option>
              </select>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 dark:bg-slate-900 text-slate-500">
                <tr>
                  <th class="text-left px-4 py-3 font-medium">渠道</th>
                  <th class="text-left px-4 py-3 font-medium">模型范围</th>
                  <th class="text-left px-4 py-3 font-medium">状态</th>
                  <th class="text-left px-4 py-3 font-medium">最近检测</th>
                  <th class="text-right px-4 py-3 font-medium">操作</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
                <template x-for="ch in filteredChannels" :key="ch.id">
                  <tr class="hover:bg-slate-50 dark:hover:bg-slate-900/60">
                    <td class="px-4 py-3">
                      <div class="font-semibold" x-text="ch.name"></div>
                      <div class="text-xs text-slate-500 mt-1">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-300" x-text="ch.type"></span>
                        <span class="ml-2">请求数: <span x-text="ch.requests || 0"></span></span>
                      </div>
                    </td>
                    <td class="px-4 py-3 font-mono text-xs" x-text="ch.models === '*' ? '全部模型 (*)' : ch.models"></td>
                    <td class="px-4 py-3">
                      <span :class="ch.status === 'active' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300' : 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300'" class="px-2 py-1 rounded-md text-xs font-semibold" x-text="ch.status"></span>
                    </td>
                    <td class="px-4 py-3 text-xs text-slate-500" x-text="ch.last_test || '-'"></td>
                    <td class="px-4 py-3">
                      <div class="flex justify-end gap-2">
                        <button @click="testChannel(ch.id)" class="px-2.5 py-1.5 rounded-lg text-xs border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700">测试</button>
                        <button @click="openEdit(ch)" class="px-2.5 py-1.5 rounded-lg text-xs border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700">编辑</button>
                        <button @click="deleteChannel(ch.id)" class="px-2.5 py-1.5 rounded-lg text-xs border border-rose-300 text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/30">删除</button>
                      </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-4">
          <h2 class="font-semibold mb-3">系统日志</h2>
          <div class="max-h-72 overflow-auto pr-1 space-y-2">
            <template x-for="log in logs" :key="log.time + log.model + log.channel">
              <div class="rounded-lg border border-slate-200 dark:border-slate-700 px-3 py-2 bg-slate-50 dark:bg-slate-900">
                <div class="flex items-center justify-between text-xs">
                  <span class="text-slate-500 font-mono" x-text="log.time"></span>
                  <span :class="String(log.status)==='200' ? 'text-emerald-600' : 'text-rose-600'" class="font-semibold" x-text="log.status"></span>
                </div>
                <div class="mt-1 text-sm font-medium truncate" x-text="log.model"></div>
                <div class="mt-1 text-xs text-slate-500 flex items-center justify-between">
                  <span x-text="log.channel"></span>
                  <span x-text="(log.latency || (log.latency_ms + 'ms')) + (log.total_tokens ? ' · ' + formatNumber(log.total_tokens) + ' tokens' : '')"></span>
                </div>
              </div>
            </template>
            <div x-show="logs.length === 0" class="text-sm text-slate-500 py-6 text-center">暂无日志</div>
          </div>
        </div>
      </section>

      <aside class="xl:col-span-4 space-y-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-4">
          <div class="flex items-center justify-between gap-2 mb-3">
            <h2 class="font-semibold">调用统计</h2>
            <button @click="clearStats()" class="px-2.5 py-1.5 rounded-lg text-xs border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700">清空</button>
          </div>
          <div class="grid grid-cols-2 gap-2 text-sm mb-4">
            <div class="rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-3">
              <div class="text-xs text-slate-500">总请求</div>
              <div class="text-xl font-bold mt-1" x-text="formatNumber(totalRequests)"></div>
            </div>
            <div class="rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-3">
              <div class="text-xs text-slate-500">平均耗时</div>
              <div class="text-xl font-bold mt-1" x-text="avgLatency"></div>
            </div>
          </div>
          <div class="space-y-4 text-xs">
            <div>
              <div class="font-semibold mb-2 text-slate-600 dark:text-slate-300">按渠道</div>
              <template x-for="item in topChannels" :key="item.name">
                <div class="flex items-center justify-between py-1.5 border-b border-slate-100 dark:border-slate-700 last:border-0">
                  <span class="truncate pr-2" x-text="item.name"></span>
                  <span class="font-mono text-slate-500" x-text="formatNumber(item.requests) + ' 次'"></span>
                </div>
              </template>
              <div x-show="topChannels.length === 0" class="text-slate-500 py-2">暂无调用</div>
            </div>
            <div>
              <div class="font-semibold mb-2 text-slate-600 dark:text-slate-300">按模型</div>
              <template x-for="item in topModels" :key="item.name">
                <div class="flex items-center justify-between py-1.5 border-b border-slate-100 dark:border-slate-700 last:border-0">
                  <span class="truncate pr-2" x-text="item.name"></span>
                  <span class="font-mono text-slate-500" x-text="formatNumber(item.requests) + ' 次'"></span>
                </div>
              </template>
              <div x-show="topModels.length === 0" class="text-slate-500 py-2">暂无调用</div>
            </div>
          </div>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-4">
          <h2 class="font-semibold mb-3">529 自动切换</h2>
          <div class="space-y-3 text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox" x-model="failover.enabled" class="rounded">
              <span>启用 529 备用模型切换</span>
            </label>
            <div>
              <label class="block text-xs text-slate-500 mb-1">备用 API 地址</label>
              <input x-model="failover.api_base" placeholder="例如: http://150.158.121.88:8000/v1" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">备用模型名称</label>
              <input x-model="failover.model" placeholder="LongCat-Flash-Chat" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-xs text-slate-500 mb-1">触发阈值</label>
                <input x-model.number="failover.trigger_529_count" type="number" min="1" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
              </div>
              <div>
                <label class="block text-xs text-slate-500 mb-1">回切秒数</label>
                <input x-model.number="failover.recover_seconds" type="number" min="30" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
              </div>
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">备用 API Key（可选）</label>
              <input x-model="failover.api_key" type="password" placeholder="留空使用服务端默认" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
            </div>
            <div class="flex items-center justify-between">
              <span class="text-xs text-slate-500" x-text="failoverSaveStatus || '未保存变更'"></span>
              <button @click="saveFailover()" class="px-3 py-2 rounded-lg bg-indigo-600 text-white text-sm hover:bg-indigo-700">保存配置</button>
            </div>
          </div>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-4">
          <h2 class="font-semibold mb-2">使用建议</h2>
          <ul class="text-xs text-slate-500 space-y-1 leading-5">
            <li>1. 新增渠道后先点“测试”，确认成功再投入流量。</li>
            <li>2. 备用模型建议配置 LongCat，减少高峰 529 中断。</li>
            <li>3. 阈值建议 2-3；回切时间建议 10-20 分钟。</li>
          </ul>
        </div>
      </aside>
    </main>

    <div x-show="showForm" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" x-transition.opacity>
      <div class="w-full max-w-2xl rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-xl">
        <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
          <h3 class="font-semibold" x-text="isEdit ? '编辑渠道' : '新增渠道'"></h3>
          <button @click="showForm = false" class="text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">关闭</button>
        </div>
        <div class="p-5 space-y-4 text-sm">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-500 mb-1">渠道名称</label>
              <input x-model="formCh.name" placeholder="例如: LongCat-2751" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">渠道类型</label>
              <select x-model="formCh.type" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
                <option value="openai">OpenAI / Proxy</option>
                <option value="gemini">Google Gemini</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-slate-500 mb-1">Base URL</label>
              <input x-model="formCh.base" placeholder="https://api.longcat.chat/openai" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">模型范围（逗号分隔）</label>
              <input x-model="formCh.models" placeholder="*, LongCat-Flash-Chat" class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
            </div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">API Key</label>
            <input x-model="formCh.key" type="password" placeholder="sk-..." class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 font-mono">
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">模型映射（JSON，可选）</label>
            <input x-model="formCh.model_mapping" placeholder='{"gpt-4o":"LongCat-Flash-Chat"}' class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 font-mono text-xs">
          </div>
          <div class="flex items-center justify-between pt-1">
            <div class="flex gap-2">
              <button @click="preset('openai')" class="px-2.5 py-1.5 rounded-lg border border-slate-300 dark:border-slate-700 text-xs">预设 OpenAI</button>
              <button @click="preset('gemini')" class="px-2.5 py-1.5 rounded-lg border border-slate-300 dark:border-slate-700 text-xs">预设 Gemini</button>
            </div>
            <button @click="testUnsaved()" class="px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700 text-xs hover:bg-slate-100 dark:hover:bg-slate-700" x-text="testStatus || '测试连接'"></button>
          </div>
          <div class="flex justify-end gap-2">
            <button @click="showForm = false" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 text-sm">取消</button>
            <button @click="saveChannel()" class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm hover:bg-indigo-700">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function app() {
      return {
        channels: [],
        logs: [],
        stats: { total: { requests: 0, success: 0, errors: 0, latency_ms: 0, total_tokens: 0 }, by_day: {}, by_channel: {}, by_model: {}, recent: [] },
        showForm: false,
        isEdit: false,
        testStatus: '',
        copied: false,
        darkMode: localStorage.getItem('theme') === 'dark',
        autoRefresh: localStorage.getItem('obp_auto_refresh') !== 'off',
        dataTimer: null,
        failoverTimer: null,
        lastRefresh: '-',
        search: '',
        statusFilter: 'all',
        failover: { enabled: true, api_base: '', api_key: '', model: 'LongCat-Flash-Chat', trigger_529_count: 3, recover_seconds: 900 },
        failoverSaveStatus: '',
        formCh: { name: '', type: 'openai', key: '', base: '', models: '*', model_mapping: '' },
        get activeCount() { return this.channels.filter(c => c.status === 'active').length; },
        get errorCount() { return this.channels.filter(c => c.status !== 'active').length; },
        get totalRequests() { return this.stats.total?.requests || 0; },
        get totalTokens() { return this.stats.total?.total_tokens || 0; },
        get todayKey() { return new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Shanghai' }); },
        get todayRequests() { return this.stats.by_day?.[this.todayKey]?.requests || 0; },
        get sevenDayRequests() {
          let sum = 0;
          for (let i = 0; i < 7; i++) {
            const day = new Date(Date.now() - i * 86400000).toLocaleDateString('sv-SE', { timeZone: 'Asia/Shanghai' });
            sum += this.stats.by_day?.[day]?.requests || 0;
          }
          return sum;
        },
        get successRate() {
          const total = this.stats.total?.requests || 0;
          if (!total) return '-';
          return (Math.round(((this.stats.total?.success || 0) * 1000) / total) / 10) + '%';
        },
        get avgLatency() {
          const total = this.stats.total?.requests || 0;
          if (!total) return '-';
          return Math.round((this.stats.total?.latency_ms || 0) / total) + 'ms';
        },
        get topChannels() { return this.bucketList(this.stats.by_channel); },
        get topModels() { return this.bucketList(this.stats.by_model); },
        get filteredChannels() {
          return this.channels.filter(c => {
            const text = (c.name + ' ' + (c.models || '')).toLowerCase();
            const passText = !this.search || text.includes(this.search.toLowerCase());
            const passStatus = this.statusFilter === 'all' || c.status === this.statusFilter;
            return passText && passStatus;
          });
        },
        init() {
          this.refreshNow();
          this.startAutoRefresh();
        },
        startAutoRefresh() {
          if (this.dataTimer) clearInterval(this.dataTimer);
          if (this.failoverTimer) clearInterval(this.failoverTimer);
          if (!this.autoRefresh) return;
          this.dataTimer = setInterval(() => this.fetchData(), 2500);
          this.failoverTimer = setInterval(() => this.fetchFailover(), 10000);
        },
        toggleAutoRefresh() {
          this.autoRefresh = !this.autoRefresh;
          localStorage.setItem('obp_auto_refresh', this.autoRefresh ? 'on' : 'off');
          this.startAutoRefresh();
        },
        async refreshNow() {
          await Promise.all([this.fetchData(), this.fetchFailover()]);
          this.lastRefresh = new Date().toLocaleTimeString();
        },
        toggleDarkMode() {
          this.darkMode = !this.darkMode;
          localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
        },
        openAdd() {
          this.isEdit = false;
          this.testStatus = '';
          this.formCh = { name: '', type: 'openai', key: '', base: 'https://api.longcat.chat/openai', models: '*', model_mapping: '' };
          this.showForm = true;
        },
        openEdit(ch) {
          this.isEdit = true;
          this.testStatus = '';
          this.formCh = { ...ch };
          this.showForm = true;
        },
        preset(type) {
          if (type === 'gemini') {
            this.formCh.type = 'gemini';
            this.formCh.base = 'https://generativelanguage.googleapis.com/v1beta/models/';
            this.formCh.models = 'gemini-1.5-flash,gemini-1.5-pro';
          } else {
            this.formCh.type = 'openai';
            this.formCh.base = 'https://api.longcat.chat/openai';
            this.formCh.models = '*';
          }
        },
        copy(text) {
          navigator.clipboard.writeText(text);
          this.copied = true;
          setTimeout(() => this.copied = false, 1500);
        },
        emptyStats() {
          return { total: { requests: 0, success: 0, errors: 0, latency_ms: 0, total_tokens: 0 }, by_day: {}, by_channel: {}, by_model: {}, recent: [] };
        },
        formatNumber(value) {
          return new Intl.NumberFormat('zh-CN').format(value || 0);
        },
        bucketList(map) {
          return Object.entries(map || {})
            .map(([name, bucket]) => ({ name, ...(bucket || {}) }))
            .sort((a, b) => (b.requests || 0) - (a.requests || 0))
            .slice(0, 6);
        },
        async clearStats() {
          if (!confirm('确定清空 OBP 调用统计吗？')) return;
          await fetch('/admin/stats', { method: 'DELETE' });
          await this.fetchData();
        },
        async fetchData() {
          try {
            const res = await fetch('/admin/channels');
            const data = await res.json();
            this.channels = data.channels || [];
            this.stats = data.stats || this.emptyStats();
            this.logs = data.logs || this.stats.recent || [];
            this.lastRefresh = new Date().toLocaleTimeString();
          } catch (e) {}
        },
        async saveChannel() {
          await fetch(this.isEdit ? '/admin/channels/' + this.formCh.id : '/admin/channels', {
            method: this.isEdit ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.formCh)
          });
          this.showForm = false;
          await this.fetchData();
        },
        async deleteChannel(id) {
          if (confirm('确定删除这个渠道吗？')) {
            await fetch('/admin/channels/' + id, { method: 'DELETE' });
            await this.fetchData();
          }
        },
        async testChannel(id) {
          await fetch('/admin/test/' + id, { method: 'POST' });
          await this.fetchData();
        },
        async testUnsaved() {
          this.testStatus = '测试中...';
          try {
            const res = await fetch('/admin/test_unsaved', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.formCh)
            });
            const r = await res.json();
            this.testStatus = r.msg || '测试完成';
          } catch (e) {
            this.testStatus = '连接失败';
          }
        },
        async fetchFailover() {
          try {
            const res = await fetch('/admin/failover');
            this.failover = await res.json();
          } catch (e) {}
        },
        async saveFailover() {
          this.failoverSaveStatus = '保存中...';
          try {
            const res = await fetch('/admin/failover', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.failover)
            });
            this.failover = await res.json();
            this.failoverSaveStatus = '已保存';
          } catch (e) {
            this.failoverSaveStatus = '保存失败';
          }
        }
      };
    }
  </script>
